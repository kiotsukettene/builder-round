$kind: http-request
name: Refresh Token
method: POST
url: '{{baseUrl}}/api/v1/auth/refresh'
order: 4000
body:
  type: json
  content: |-
    {
      "refreshToken": "{{refreshToken}}"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      const res = pm.response.json();
      if (res.data?.accessToken) pm.collectionVariables.set("accessToken", res.data.accessToken);
