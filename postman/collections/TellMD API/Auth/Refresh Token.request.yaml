$kind: http-request
url: "{{baseUrl}}/api/v1/auth/refresh"
method: POST
body:
  type: json
  content: |-
    {
      "refreshToken": "{{refreshToken}}"
    }
scripts:
  - type: afterResponse
    code: |-
      const res = pm.response.json();
      if (res.data?.accessToken) pm.collectionVariables.set("accessToken", res.data.accessToken);
    language: text/javascript
order: 6000
