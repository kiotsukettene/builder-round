$kind: http-request
name: Update Profile
method: PATCH
url: '{{baseUrl}}/api/v1/doctors/me'
order: 3000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{accessToken}}'
body:
  type: json
  content: |-
    {
      "firstName":"",
      "lastName":"",
      "specialization":"",
      "bio":"",
      "fee":0
    }