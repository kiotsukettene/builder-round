$kind: http-request
name: Upload Profile Picture
method: POST
url: '{{baseUrl}}/api/v1/patients/me/profile-picture'
order: 1000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{accessToken}}'
body:
  type: formdata
  content:
    - key: profilePicture
      type: file
      src: ''
