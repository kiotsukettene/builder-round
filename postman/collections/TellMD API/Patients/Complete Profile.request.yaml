$kind: http-request
url: "{{baseUrl}}/api/v1/patients/me"
method: PUT
body:
  type: json
  content: |-
    {
      "firstName": "Jane",
      "lastName": "Doe",
      "birthday": "1990-05-15",
      "weight": 65,
      "height": 170,
      "phone": "+1234567890",
      "history": "No known allergies. Occasional seasonal allergies."
    }
auth:
  type: bearer
  credentials:
    token: "{{accessToken}}"
order: 2000
